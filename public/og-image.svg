<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="120" rx="3" fill="#6366f1"/>

  <!-- Site name -->
  <text x="110" y="268" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#f1f5f9">DevLog</text>

  <!-- Tagline -->
  <text x="110" y="318" font-family="monospace, 'Courier New'" font-size="26" fill="#94a3b8">A programmer's thoughts on code, tools &amp; craft</text>

  <!-- Terminal prompt decoration -->
  <text x="80" y="420" font-family="monospace, 'Courier New'" font-size="18" fill="#6366f1">~/</text>
  <text x="110" y="420" font-family="monospace, 'Courier New'" font-size="18" fill="#475569">devlog --read</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#6366f1" opacity="0.6"/>
</svg>
